<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>สมุดบัญชีสินเชื่อบ้าน — CSI204 Lab#9</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#152742;
    --navy-deep:#0d1a2e;
    --brass:#c8a24a;
    --brass-soft:#e4cd8f;
    --paper:#f6f1e4;
    --paper-line:#ded4bb;
    --ink:#26241d;
    --ink-soft:#6b6455;
    --stamp-red:#9c2f34;
    --ledger-green:#2f5c46;
  }
  *{box-sizing:border-box;}
  body{
    font-family:'Sarabun',sans-serif;
    background:
      radial-gradient(circle at 15% 10%, #1c3155 0%, transparent 45%),
      var(--navy-deep);
    min-height:100vh;
    padding:40px 16px;
    color:var(--ink);
  }

  .book{
    max-width:760px;
    margin:auto;
    position:relative;
  }

  /* ===== Cover strip (passbook spine) ===== */
  .cover{
    background:linear-gradient(160deg, var(--navy) 0%, #1e3760 100%);
    border-radius:14px 14px 0 0;
    padding:26px 32px 22px 46px;
    position:relative;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
  }
  .cover::before{
    content:"";
    position:absolute; left:0; top:0; bottom:0; width:26px;
    background-image:radial-gradient(circle, var(--navy-deep) 3.5px, transparent 3.6px);
    background-size:26px 22px;
    background-position:8px 10px;
    border-right:1px dashed rgba(255,255,255,.15);
  }
  .cover .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    letter-spacing:.18em;
    font-size:11px;
    color:var(--brass-soft);
    text-transform:uppercase;
  }
  .cover h1{
    font-family:'Noto Serif Thai',serif;
    font-weight:700;
    font-size:26px;
    color:#fff;
    margin:6px 0 2px;
  }
  .cover p{
    font-size:13px;
    color:rgba(255,255,255,.65);
    margin:0;
  }
  .cover .seal{
    position:absolute; right:28px; top:20px;
    width:58px; height:58px;
    border:2px solid var(--brass);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Noto Serif Thai',serif;
    color:var(--brass);
    font-size:22px;
    transform:rotate(-8deg);
    opacity:.9;
  }

  /* ===== Ledger body ===== */
  .ledger{
    background:var(--paper);
    padding:30px 32px 34px 46px;
    position:relative;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
  }
  .ledger::before{
    content:"";
    position:absolute; left:0; top:0; bottom:0; width:26px;
    background-image:radial-gradient(circle, #cfc3a3 3.5px, transparent 3.6px);
    background-size:26px 22px;
    background-position:8px 10px;
    border-right:1px dashed #cbbf9e;
  }

  .field-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px 22px;
    margin-top:6px;
  }
  .field label{
    display:block;
    font-size:12.5px;
    color:var(--ink-soft);
    margin-bottom:5px;
    font-family:'IBM Plex Mono',monospace;
    letter-spacing:.03em;
  }
  .field input, .field select{
    width:100%;
    padding:10px 4px;
    border:none;
    border-bottom:2px solid var(--paper-line);
    background:transparent;
    font-size:16px;
    font-family:'IBM Plex Mono',monospace;
    color:var(--ink);
    outline:none;
    transition:border-color .2s;
  }
  .field input:focus, .field select:focus{
    border-bottom-color:var(--brass);
  }

  .stamp-btn{
    margin-top:26px;
    width:100%;
    padding:14px;
    background:var(--navy);
    color:var(--brass-soft);
    border:none;
    border-radius:3px;
    font-size:15px;
    font-family:'Noto Serif Thai',serif;
    font-weight:700;
    letter-spacing:.04em;
    cursor:pointer;
    transition:background .2s, transform .1s;
  }
  .stamp-btn:hover{ background:#1e3760; }
  .stamp-btn:active{ transform:scale(.99); }

  .error{
    color:var(--stamp-red);
    margin-top:12px;
    font-size:13.5px;
    font-family:'IBM Plex Mono',monospace;
  }

  /* ===== Summary: stamped entries ===== */
  .summary{
    margin-top:30px;
    padding-top:22px;
    border-top:1px dashed var(--paper-line);
  }
  .summary-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:1px;
    background:var(--paper-line);
    border:1px solid var(--paper-line);
  }
  .entry{
    background:var(--paper);
    padding:14px 16px;
  }
  .entry .label{
    font-size:11.5px;
    color:var(--ink-soft);
    font-family:'IBM Plex Mono',monospace;
    letter-spacing:.03em;
  }
  .entry .value{
    font-size:17px;
    font-weight:600;
    color:var(--navy);
    margin-top:4px;
    font-family:'IBM Plex Mono',monospace;
  }

  .headline{
    margin-top:16px;
    background:var(--navy);
    color:#fff;
    padding:18px 20px;
    border-radius:4px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:relative;
    overflow:hidden;
  }
  .headline::after{
    content:"ตรารับรอง";
    position:absolute; right:-10px; top:-14px;
    font-family:'Noto Serif Thai',serif;
    font-size:11px;
    color:rgba(255,255,255,.12);
    border:1.5px solid rgba(255,255,255,.12);
    border-radius:50%;
    width:60px;height:60px;
    display:flex;align-items:center;justify-content:center;
    text-align:center;
    transform:rotate(12deg);
  }
  .headline .label{
    font-size:12.5px;
    color:var(--brass-soft);
    font-family:'IBM Plex Mono',monospace;
  }
  .headline .value{
    font-size:24px;
    font-weight:700;
    font-family:'IBM Plex Mono',monospace;
    margin-top:4px;
  }

  h2.section-title{
    font-family:'Noto Serif Thai',serif;
    font-size:15px;
    color:var(--navy);
    margin:28px 0 10px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  h2.section-title::after{
    content:"";
    flex:1;
    height:1px;
    background:repeating-linear-gradient(90deg, var(--paper-line) 0 4px, transparent 4px 8px);
  }

  table{
    width:100%;
    border-collapse:collapse;
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
  }
  thead th{
    text-align:right;
    color:var(--ink-soft);
    font-weight:500;
    padding:6px 8px;
    border-bottom:2px solid var(--navy);
    font-size:11.5px;
    letter-spacing:.02em;
  }
  thead th:first-child, tbody td:first-child{ text-align:left; }
  tbody td{
    padding:7px 8px;
    text-align:right;
    border-bottom:1px solid var(--paper-line);
  }
  tbody tr:nth-child(even){ background:rgba(200,162,74,.07); }
  td.principal{ color:var(--ledger-green); }
  td.interest{ color:var(--stamp-red); }

  .foot{
    margin-top:22px;
    padding-top:14px;
    border-top:1px dashed var(--paper-line);
    font-size:11px;
    color:var(--ink-soft);
    font-family:'IBM Plex Mono',monospace;
    display:flex;
    justify-content:space-between;
  }

  @media (max-width:520px){
    .field-row{ grid-template-columns:1fr; }
    .summary-grid{ grid-template-columns:1fr; }
    .cover .seal{ display:none; }
    .cover, .ledger{ padding-left:34px; }
  }
</style>
</head>
<body>
<div class="book">

  <div class="cover">
    <div class="eyebrow">CSI204 · Lab 9</div>
    <h1>สมุดบัญชีสินเชื่อบ้าน</h1>
    <p>ระบบคำนวณสินเชื่อบ้านแบบลดต้นลดดอก (Effective Rate)</p>
    <div class="seal">฿</div>
  </div>

  <div class="ledger">
    <div class="field-row">
      <div class="field">
        <label>ราคาบ้าน (บาท)</label>
        <input type="number" id="housePrice" value="3000000">
      </div>
      <div class="field">
        <label>เงินดาวน์ (บาท)</label>
        <input type="number" id="downPayment" value="300000">
      </div>
      <div class="field">
        <label>อัตราดอกเบี้ย (% ต่อปี)</label>
        <input type="number" id="interestRate" value="5" step="0.01">
      </div>
      <div class="field">
        <label>ระยะเวลาผ่อน</label>
        <select id="years">
          <option value="10">10 ปี</option>
          <option value="20">20 ปี</option>
          <option value="30" selected>30 ปี</option>
        </select>
      </div>
    </div>

    <button class="stamp-btn" onclick="calculateMortgage()">ประทับตรา — คำนวณสินเชื่อ</button>
    <div id="error" class="error"></div>

    <div id="summarySection" style="display:none">
      <div class="summary">
        <div class="summary-grid">
          <div class="entry"><div class="label">วงเงินกู้สุทธิ</div><div class="value" id="sLoan"></div></div>
          <div class="entry"><div class="label">จำนวนงวดทั้งหมด</div><div class="value" id="sMonths"></div></div>
          <div class="entry"><div class="label">ดอกเบี้ยรวมทั้งสัญญา</div><div class="value" id="sInterest"></div></div>
          <div class="entry"><div class="label">ยอดชำระรวมทั้งหมด</div><div class="value" id="sTotal"></div></div>
        </div>
        <div class="headline">
          <div>
            <div class="label">ค่างวดต่อเดือน</div>
            <div class="value" id="sPayment"></div>
          </div>
        </div>
      </div>

      <h2 class="section-title">ตารางผ่อนชำระ · 12 งวดแรก</h2>
      <table>
        <thead><tr><th>งวด</th><th>เงินต้น</th><th>ดอกเบี้ย</th><th>ยอดชำระ</th><th>คงเหลือ</th></tr></thead>
        <tbody id="amortTable"></tbody>
      </table>

      <div class="foot">
        <span>เอกสารนี้จัดทำโดยระบบอัตโนมัติ</span>
        <span id="genDate"></span>
      </div>
    </div>
  </div>
</div>

<script>
function formatTHB(num) {
  return num.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " บาท";
}

function calculateMortgage() {
  const housePrice = parseFloat(document.getElementById("housePrice").value);
  const downPayment = parseFloat(document.getElementById("downPayment").value);
  const annualRate = parseFloat(document.getElementById("interestRate").value);
  const years = parseInt(document.getElementById("years").value);

  const errorBox = document.getElementById("error");
  errorBox.innerText = "";

  if ([housePrice, downPayment, annualRate, years].some(v => isNaN(v))) {
    errorBox.innerText = "กรุณากรอกข้อมูลให้ครบทุกช่อง";
    document.getElementById("summarySection").style.display = "none";
    return;
  }
  if (housePrice <= 0 || downPayment < 0 || downPayment >= housePrice) {
    errorBox.innerText = "เงินดาวน์ต้องน้อยกว่าราคาบ้าน และราคาบ้านต้องมากกว่า 0";
    document.getElementById("summarySection").style.display = "none";
    return;
  }
  if (annualRate <= 0 || annualRate > 30) {
    errorBox.innerText = "อัตราดอกเบี้ยไม่ถูกต้อง";
    document.getElementById("summarySection").style.display = "none";
    return;
  }

  const loanAmount = housePrice - downPayment;
  const months = years * 12;
  const monthlyRate = annualRate / 100 / 12;

  const monthlyPayment = (loanAmount * monthlyRate * Math.pow(1 + monthlyRate, months)) /
                          (Math.pow(1 + monthlyRate, months) - 1);

  let remaining = loanAmount;
  let totalInterest = 0;
  let amortRows = "";

  for (let i = 1; i <= months; i++) {
    const interest = remaining * monthlyRate;
    const principal = monthlyPayment - interest;
    remaining -= principal;
    totalInterest += interest;

    if (i <= 12) {
      amortRows += `<tr>
        <td>${i}</td>
        <td class="principal">${principal.toFixed(2)}</td>
        <td class="interest">${interest.toFixed(2)}</td>
        <td>${monthlyPayment.toFixed(2)}</td>
        <td>${Math.max(0, remaining).toFixed(2)}</td>
      </tr>`;
    }
  }

  const totalPaid = monthlyPayment * months;

  document.getElementById("sLoan").innerText = formatTHB(loanAmount);
  document.getElementById("sMonths").innerText = months + " งวด";
  document.getElementById("sPayment").innerText = formatTHB(monthlyPayment);
  document.getElementById("sInterest").innerText = formatTHB(totalInterest);
  document.getElementById("sTotal").innerText = formatTHB(totalPaid);
  document.getElementById("amortTable").innerHTML = amortRows;
  document.getElementById("summarySection").style.display = "block";

  const now = new Date();
  document.getElementById("genDate").innerText = now.toLocaleDateString('th-TH', { year:'numeric', month:'long', day:'numeric' });
}

calculateMortgage();
</script>
</body>
</html>
